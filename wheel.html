<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Δ Τ Δ — Wheel of Brothers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0910;color:#F0E8D0;font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(92,31,107,.35) 0%,transparent 65%);pointer-events:none;z-index:0}
.topbar{position:relative;z-index:10;background:linear-gradient(180deg,#3D0C45 0%,#150D1A 100%);border-bottom:1px solid rgba(201,168,76,.38);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.topbar-brand{display:flex;align-items:center;gap:1rem}
.topbar-symbol{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:#C9A84C;text-shadow:0 0 20px rgba(201,168,76,.5)}
.topbar-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.25em;color:#8A7235;text-transform:uppercase}
.topbar-nav{display:flex;gap:.5rem}
.nav-link{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;color:#9A8E7A;text-decoration:none;padding:.35rem .8rem;border:1px solid rgba(201,168,76,.18);border-radius:4px;transition:all .2s}
.nav-link:hover{color:#C9A84C;border-color:rgba(201,168,76,.4)}
.nav-link.active{color:#C9A84C;border-color:#8A7235;background:rgba(201,168,76,.12)}
.main{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;min-height:calc(100vh - 60px);gap:2.5rem}
.page-title{font-family:'Cinzel',serif;font-size:1.4rem;color:#C9A84C;letter-spacing:.1em;text-align:center}
.page-sub{font-style:italic;color:#9A8E7A;font-size:.95rem;text-align:center;margin-top:.4rem}
.picker-card{background:#1A0F21;border:2px solid rgba(201,168,76,.3);border-radius:12px;padding:3rem 4rem;text-align:center;position:relative;box-shadow:0 0 60px rgba(92,31,107,.4),inset 0 0 40px rgba(0,0,0,.3);min-width:360px}
.picker-card::before,.picker-card::after{content:'';position:absolute;width:28px;height:28px;border-color:#C9A84C;border-style:solid}
.picker-card::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:2px 0 0 0}
.picker-card::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 2px 0}
.picker-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.35em;color:#5C5248;text-transform:uppercase;margin-bottom:1.5rem}
.name-display{font-family:'Cinzel Decorative',serif;font-size:2.8rem;color:#C9A84C;min-height:3.5rem;line-height:1.2;transition:color .08s;text-shadow:0 0 30px rgba(201,168,76,.3)}
.name-display.rolling{color:#7B3094;text-shadow:0 0 20px rgba(123,48,148,.5)}
.name-display.winner{color:#C9A84C;text-shadow:0 0 40px rgba(201,168,76,.7),0 0 80px rgba(201,168,76,.3);animation:pulse .6s ease-in-out 3}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.spin-btn{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;padding:1rem 3.5rem;background:linear-gradient(135deg,#C9A84C,#8A7235);color:#0D0910;border:none;border-radius:4px;cursor:pointer;font-weight:700;transition:all .2s;box-shadow:0 4px 20px rgba(201,168,76,.3);margin-top:1.5rem}
.spin-btn:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 6px 28px rgba(201,168,76,.5);transform:translateY(-2px)}
.spin-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.members-panel{background:#1A0F21;border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:1.25rem 1.5rem;width:100%;max-width:500px}
.members-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.2em;color:#8A7235;text-transform:uppercase;margin-bottom:.9rem;padding-bottom:.6rem;border-bottom:1px solid rgba(201,168,76,.1)}
.members-list{display:flex;flex-wrap:wrap;gap:.5rem}
.member-chip{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.08em;padding:.25rem .7rem;border-radius:20px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.15);color:#9A8E7A;cursor:pointer;transition:all .15s;user-select:none}
.member-chip:hover{border-color:rgba(201,168,76,.4);color:#C9A84C}
.member-chip.excluded{background:rgba(207,74,74,.08);border-color:rgba(207,74,74,.2);color:#CF4A4A;text-decoration:line-through}
.members-hint{font-size:.78rem;color:#3A2E28;font-style:italic;margin-top:.75rem}
.empty-state{color:#5C5248;font-style:italic;text-align:center;padding:1rem}

  /* ── MOBILE RESPONSIVE ── */
  .mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.08em;gap:2px;border-right:1px solid rgba(201,168,76,.1);transition:background .15s}
  .mob-nav-btn:last-child{border-right:none}
  .mob-nav-btn span:first-child{font-size:1.15rem;line-height:1}
  .mob-nav-btn.mob-active{background:rgba(201,168,76,.1)}
  @media(max-width:768px){
    #mobile-bottom-nav{display:flex !important}
    body,#app,#main-app{padding-bottom:58px}
    .topbar{padding:0 .9rem;height:auto;min-height:54px;flex-wrap:wrap;gap:.3rem;padding-top:.4rem;padding-bottom:.4rem}
    .topbar-nav-links,.topbar-nav{display:none !important}
    .topbar-title,.topbar-sub{display:none}
    .topbar-user{gap:.4rem}
    .user-badge{padding:.25rem .55rem}
    .sidebar{display:none !important}
    .content{padding:.9rem .75rem !important}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{min-width:480px}
    .page-header{flex-direction:column;align-items:flex-start;gap:.6rem}
    .card,.modal-body{padding:1rem}
    .form-input{font-size:16px !important}
    .stats-row{grid-template-columns:1fr 1fr !important}
    .items-grid{grid-template-columns:1fr !important}
    .modal{max-width:calc(100vw - 1rem)}
    .action-btns{flex-wrap:wrap}
    .btn-sm{padding:.35rem .65rem;font-size:.58rem}
  }
  @media(max-width:420px){
    .stats-row{grid-template-columns:1fr !important}
    .podium{grid-template-columns:1fr !important}
    .days-grid{grid-template-columns:repeat(2,1fr) !important}
    .form-row{grid-template-columns:1fr !important}
    .header-actions{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <span class="topbar-symbol">ΔΤΔ</span>
    <span class="topbar-title">Wheel of Brothers</span>
  </div>
  <div class="topbar-nav">
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/points">⚔ Points</a>
    <a class="nav-link" href="/budget">◈ Budget</a>
    <a class="nav-link active" href="/wheel">🎡 Wheel</a>
  </div>
</div>
<div class="main">
  <div>
    <div class="page-title">Wheel of Brothers</div>
    <div class="page-sub">Spin to select a random brother</div>
  </div>
  <div id="loading" class="empty-state">Loading brothers...</div>
  <div id="picker-section" style="display:none;flex-direction:column;align-items:center">
    <div class="picker-card">
      <div class="picker-label">Selected Brother</div>
      <div class="name-display" id="name-display">—</div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spin()">✦ Choose a Brother</button>
  </div>
  <div class="members-panel" id="members-panel" style="display:none">
    <div class="members-title">Brothers in the draw — click to exclude</div>
    <div class="members-list" id="members-list"></div>
    <div class="members-hint">Click a name to remove them from the draw. Click again to add back.</div>
  </div>
</div>
<script>
let members = [];
let excluded = new Set();
let spinning = false;

async function loadMembers() {
  try {
    const r = await fetch('/wheel/api/members');
    members = await r.json();
    document.getElementById('loading').style.display = 'none';
    if (members.length < 2) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = 'Need at least 2 active members.';
      return;
    }
    document.getElementById('picker-section').style.display = 'flex';
    document.getElementById('members-panel').style.display = 'block';
    renderChips();
  } catch(e) {
    document.getElementById('loading').textContent = 'Could not load members.';
  }
}

function active() {
  return members.filter(m => !excluded.has(m.user_id));
}

function renderChips() {
  document.getElementById('members-list').innerHTML = members.map(m =>
    '<div class="member-chip ' + (excluded.has(m.user_id) ? 'excluded' : '') + '" onclick="toggleExclude(' + m.user_id + ')">' + m.username + '</div>'
  ).join('');
}

function toggleExclude(id) {
  if (spinning) return;
  if (excluded.has(id)) {
    excluded.delete(id);
  } else {
    if (active().length <= 2) return;
    excluded.add(id);
  }
  renderChips();
}

function spin() {
  const pool = active();
  if (pool.length < 2 || spinning) return;

  spinning = true;
  document.getElementById('spin-btn').disabled = true;

  const display = document.getElementById('name-display');
  display.classList.remove('winner');
  display.classList.add('rolling');

  // Pick winner up front
  const winner = pool[Math.floor(Math.random() * pool.length)];

  const totalDuration = 2800 + Math.random() * 800;
  const startTime = performance.now();
  let lastSwap = 0;

  function step(now) {
    const elapsed = now - startTime;

    if (elapsed >= totalDuration) {
      display.textContent = winner.username;
      display.classList.remove('rolling');
      display.classList.add('winner');
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      return;
    }

    // Interval starts fast (60ms) and slows to 220ms
    const t = Math.min(elapsed / totalDuration, 1);
    const interval = 60 + (t * t) * 160;

    if (now - lastSwap >= interval) {
      const others = pool.filter(m => m.user_id !== winner.user_id);
      const pick = others.length > 0
        ? others[Math.floor(Math.random() * others.length)]
        : pool[Math.floor(Math.random() * pool.length)];
      display.textContent = pick.username;
      lastSwap = now;
    }

    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

loadMembers();
</script>

  <!-- MOBILE BOTTOM NAV -->
  <nav id="mobile-bottom-nav" style="display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:#150D1A;border-top:1px solid rgba(201,168,76,.25);z-index:500;align-items:stretch">
    <a href="/points" class="mob-nav-btn" style="color:#9A8E7A"><span>⚔</span><span>Points</span></a>
    <a href="/budget" class="mob-nav-btn" style="color:#9A8E7A"><span>◈</span><span>Budget</span></a>
    <a href="/wheel" class="mob-nav-btn" style="color:#C9A84C"><span>🎡</span><span>Wheel</span></a>
    <a href="/dailies" class="mob-nav-btn" style="color:#9A8E7A"><span>📋</span><span>Dailies</span></a>
  </nav>
</body>
</html>
