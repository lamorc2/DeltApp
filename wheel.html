<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Δ Τ Δ — Wheel of Brothers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0910;color:#F0E8D0;font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(92,31,107,.35) 0%,transparent 65%);pointer-events:none;z-index:0}

/* TOPBAR */
.topbar{position:relative;z-index:10;background:linear-gradient(180deg,#3D0C45 0%,#150D1A 100%);border-bottom:1px solid rgba(201,168,76,.38);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.topbar-brand{display:flex;align-items:center;gap:1rem}
.topbar-symbol{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:#C9A84C;text-shadow:0 0 20px rgba(201,168,76,.5)}
.topbar-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.25em;color:#8A7235;text-transform:uppercase}
.topbar-nav{display:flex;gap:.5rem}
.nav-link{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;color:#9A8E7A;text-decoration:none;padding:.35rem .8rem;border:1px solid rgba(201,168,76,.18);border-radius:4px;transition:all .2s}
.nav-link:hover{color:#C9A84C;border-color:rgba(201,168,76,.4)}
.nav-link.active{color:#C9A84C;border-color:#8A7235;background:rgba(201,168,76,.12)}

/* LAYOUT */
.main{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem;min-height:calc(100vh - 60px)}
.page-title{font-family:'Cinzel',serif;font-size:1.4rem;color:#C9A84C;letter-spacing:.1em;margin-bottom:.4rem;text-align:center}
.page-sub{font-style:italic;color:#9A8E7A;font-size:.95rem;margin-bottom:2.5rem;text-align:center}

/* WHEEL CONTAINER */
.wheel-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:2rem}

/* POINTER */
.pointer{position:absolute;top:50%;right:-22px;transform:translateY(-50%);width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;border-left:36px solid #C9A84C;filter:drop-shadow(0 0 8px rgba(201,168,76,.6));z-index:20}

canvas{border-radius:50%;box-shadow:0 0 0 4px rgba(201,168,76,.3),0 0 40px rgba(92,31,107,.5),0 0 80px rgba(0,0,0,.4)}

/* SPIN BUTTON */
.spin-btn{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;padding:1rem 3rem;background:linear-gradient(135deg,#C9A84C,#8A7235);color:#0D0910;border:none;border-radius:4px;cursor:pointer;transition:all .2s;font-weight:700;box-shadow:0 4px 20px rgba(201,168,76,.3)}
.spin-btn:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 6px 28px rgba(201,168,76,.5);transform:translateY(-2px)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* RESULT */
.result-wrap{margin-top:2rem;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-name{font-family:'Cinzel Decorative',serif;font-size:2.2rem;color:#C9A84C;text-shadow:0 0 30px rgba(201,168,76,.5);opacity:0;transform:scale(.8);transition:all .4s cubic-bezier(.175,.885,.32,1.275)}
.result-name.show{opacity:1;transform:scale(1)}
.result-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.3em;color:#5C5248;text-transform:uppercase;margin-bottom:.5rem}

/* MEMBERS SIDEBAR */
.members-panel{margin-top:2rem;background:#1A0F21;border:1px solid rgba(201,168,76,.18);border-radius:8px;padding:1.25rem;width:100%;max-width:480px}
.members-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;color:#8A7235;text-transform:uppercase;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(201,168,76,.12)}
.members-list{display:flex;flex-wrap:wrap;gap:.5rem}
.member-chip{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.08em;padding:.25rem .7rem;border-radius:20px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);color:#9A8E7A;cursor:pointer;transition:all .15s;user-select:none}
.member-chip:hover{border-color:rgba(201,168,76,.4);color:#C9A84C}
.member-chip.excluded{background:rgba(207,74,74,.08);border-color:rgba(207,74,74,.2);color:#CF4A4A;text-decoration:line-through}
.members-hint{font-size:.8rem;color:#5C5248;font-style:italic;margin-top:.75rem}

.empty-state{text-align:center;color:#5C5248;font-style:italic;padding:2rem}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <span class="topbar-symbol">ΔΤΔ</span>
    <span class="topbar-title">Wheel of Brothers</span>
  </div>
  <div class="topbar-nav">
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/points">⚔ Points</a>
    <a class="nav-link" href="/budget">◈ Budget</a>
    <a class="nav-link active" href="/wheel">🎡 Wheel</a>
  </div>
</div>

<div class="main">
  <div class="page-title">Wheel of Brothers</div>
  <div class="page-sub">Spin to select a random brother</div>

  <div id="loading" class="empty-state">Loading brothers...</div>

  <div id="wheel-section" style="display:none;flex-direction:column;align-items:center">
    <div class="wheel-wrap">
      <canvas id="wheel" width="420" height="420"></canvas>
      <div class="pointer"></div>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="spin()">✦ Spin the Wheel</button>

    <div class="result-wrap">
      <div class="result-label" id="result-label" style="display:none">Selected Brother</div>
      <div class="result-name" id="result-name"></div>
    </div>

    <div class="members-panel">
      <div class="members-title">Brothers on the Wheel — click to exclude</div>
      <div class="members-list" id="members-list"></div>
      <div class="members-hint">Click a name to exclude them from the spin. Click again to re-include.</div>
    </div>
  </div>
</div>

<script>
const COLORS = [
  '#4A0E4E','#5C1F6B','#3D0C45','#6B2D7A','#2D0935',
  '#7B3094','#4A1A5C','#3A0A42','#5A1868','#280830',
];
const GOLD = '#C9A84C';
const TEXT_COLOR = '#F0E8D0';

let members = [];
let excluded = new Set();
let spinning = false;
let currentAngle = 0;

async function loadMembers() {
  try {
    const r = await fetch('/wheel/api/members');
    members = await r.json();
    document.getElementById('loading').style.display = 'none';
    if (members.length < 2) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = 'Need at least 2 active members to spin.';
      return;
    }
    document.getElementById('wheel-section').style.display = 'flex';
    renderMemberChips();
    drawWheel();
  } catch(e) {
    document.getElementById('loading').textContent = 'Could not load members.';
  }
}

function activeMembers() {
  return members.filter(m => !excluded.has(m.user_id));
}

function renderMemberChips() {
  const list = document.getElementById('members-list');
  list.innerHTML = members.map(m => `
    <div class="member-chip ${excluded.has(m.user_id) ? 'excluded' : ''}"
         onclick="toggleExclude(${m.user_id})">${m.username}</div>
  `).join('');
}

function toggleExclude(id) {
  if (spinning) return;
  if (excluded.has(id)) {
    excluded.delete(id);
  } else {
    // Don't exclude if only 2 left
    if (activeMembers().length <= 2) return;
    excluded.add(id);
  }
  renderMemberChips();
  drawWheel();
  // Clear result
  document.getElementById('result-name').classList.remove('show');
  document.getElementById('result-label').style.display = 'none';
}

function drawWheel(highlightIdx = -1) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = cx - 8;
  const active = activeMembers();
  const n = active.length;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (n === 0) return;

  const sliceAngle = (2 * Math.PI) / n;

  for (let i = 0; i < n; i++) {
    const start = currentAngle + i * sliceAngle;
    const end = start + sliceAngle;

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = i === highlightIdx ? GOLD : COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(201,168,76,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + sliceAngle / 2);

    const maxLen = 12;
    const label = active[i].username.length > maxLen
      ? active[i].username.slice(0, maxLen) + '…'
      : active[i].username;

    const fontSize = n > 20 ? 9 : n > 14 ? 11 : n > 8 ? 13 : 15;
    ctx.font = `600 ${fontSize}px 'Cinzel', serif`;
    ctx.fillStyle = i === highlightIdx ? '#0D0910' : TEXT_COLOR;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, r - 12, 0);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 26, 0, 2 * Math.PI);
  ctx.fillStyle = '#0D0910';
  ctx.fill();
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center symbol
  ctx.font = "bold 14px 'Cinzel Decorative', serif";
  ctx.fillStyle = GOLD;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ΔΤΔ', cx, cy);
}

function spin() {
  const active = activeMembers();
  if (active.length < 2 || spinning) return;

  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-name').classList.remove('show');
  document.getElementById('result-label').style.display = 'none';

  // Pick winner
  const winnerIdx = Math.floor(Math.random() * active.length);
  const n = active.length;
  const sliceAngle = (2 * Math.PI) / n;

  // Calculate total rotation so the winner slice lands under the pointer (pointing right = angle 0)
  // Pointer is at right side (angle 0), winner should end up there
  // Winner slice center should be at angle 0 after rotation
  const winnerCenter = winnerIdx * sliceAngle + sliceAngle / 2;
  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const targetAngle = -winnerCenter + extraSpins;

  const duration = 4000 + Math.random() * 1500;
  const startAngle = currentAngle;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOut(progress);

    currentAngle = startAngle + targetAngle * eased;
    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = startAngle + targetAngle;
      drawWheel(winnerIdx);
      spinning = false;
      document.getElementById('spin-btn').disabled = false;

      // Show result
      const resultEl = document.getElementById('result-name');
      const labelEl = document.getElementById('result-label');
      resultEl.textContent = active[winnerIdx].username;
      labelEl.style.display = 'block';
      setTimeout(() => resultEl.classList.add('show'), 50);
    }
  }

  requestAnimationFrame(animate);
}

loadMembers();
</script>
</body>
</html>
